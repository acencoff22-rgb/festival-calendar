name: Update Festival Data

on:
  schedule:
    # 매일 한국시간 오전 6시 (UTC 21시) 실행
    - cron: "0 21 * * *"
  workflow_dispatch: {} # 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 축제 데이터 가져오기
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          CULTURE_API_KEY: ${{ secrets.CULTURE_API_KEY }}
          KOPIS_API_KEY: ${{ secrets.KOPIS_API_KEY }}
        run: node fetch-festivals.mjs

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add festivals.json
          git diff --staged --quiet || git commit -m "chore: 축제 데이터 자동 갱신 $(date +'%Y-%m-%d')"
          git push
