<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전국 축제 알리미</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
/>
<style>
  :root {
    --paper: #f6f1e7;
    --paper-deep: #ece3d0;
    --ink: #2b2620;
    --ink-soft: #6b6255;
    --lantern: #c1432f;
    --lantern-soft: #e8c9b8;
    --indigo: #2b3a55;
    --line: #d9cdb4;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 28px 20px 22px;
    background: var(--indigo);
    color: var(--paper);
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: "";
    position: absolute;
    right: -40px;
    top: -40px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--lantern) 0%, transparent 70%);
    opacity: 0.5;
  }

  header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  header p {
    margin: 0;
    font-size: 13px;
    color: #c8cfe0;
  }

  #updatedAt {
    font-size: 12px;
    color: #9aa4c0;
    margin-top: 10px;
  }

  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 16px 60px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0 20px;
    position: sticky;
    top: 0;
    background: var(--paper);
    padding: 10px 0;
    z-index: 5;
  }

  .controls input,
  .controls select {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: white;
    color: var(--ink);
  }

  .controls input { flex: 1 1 100%; min-width: 0; }
  .controls select { flex: 1 1 auto; }

  .month-group {
    margin-bottom: 28px;
  }

  .month-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin: 0 0 10px 2px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
  }

  .card {
    display: flex;
    gap: 12px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
    align-items: center;
  }

  .card img {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    object-fit: cover;
    background: var(--paper-deep);
    flex-shrink: 0;
  }

  .card .no-img {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    background: var(--paper-deep);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .card-body { flex: 1; min-width: 0; }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    font-size: 12.5px;
    color: var(--ink-soft);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .dday {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 800;
    padding: 5px 9px;
    border-radius: 999px;
    background: var(--paper-deep);
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .dday.soon {
    background: var(--lantern);
    color: white;
  }

  .dday.today {
    background: var(--ink);
    color: white;
  }

  .empty, .loading {
    text-align: center;
    color: var(--ink-soft);
    padding: 60px 20px;
    font-size: 14px;
  }

  a.card-link { text-decoration: none; color: inherit; display: block; }
</style>
</head>
<body>

<header>
  <h1>🏮 전국 축제·공연 알리미</h1>
  <p>필요할 때 열어보는 우리 동호회 축제·공연 캘린더</p>
  <div id="updatedAt">불러오는 중…</div>
</header>

<main>
  <div class="controls">
    <input id="search" type="text" placeholder="이름, 지역, 장소 검색" />
    <select id="typeFilter">
      <option value="">전체 유형</option>
      <option value="festival">지역축제</option>
      <option value="performance">공연</option>
    </select>
    <select id="areaFilter">
      <option value="">전체 지역</option>
    </select>
  </div>
  <div id="list"><div class="loading">축제 정보를 불러오는 중…</div></div>
</main>

<script>
  const AREA_NAMES = {
    "1": "서울", "2": "인천", "3": "대전", "4": "대구", "5": "광주",
    "6": "부산", "7": "울산", "8": "세종", "31": "경기", "32": "강원",
    "33": "충북", "34": "충남", "35": "경북", "36": "경남", "37": "전북",
    "38": "전남", "39": "제주"
  };

  let allFestivals = [];

  function daysUntil(dateStr) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const target = new Date(dateStr);
    target.setHours(0, 0, 0, 0);
    return Math.round((target - today) / 86400000);
  }

  function ddayLabel(startDate) {
    const d = daysUntil(startDate);
    if (d < 0) return { text: "진행 중", cls: "" };
    if (d === 0) return { text: "오늘 시작", cls: "today" };
    if (d <= 7) return { text: `D-${d}`, cls: "soon" };
    return { text: `D-${d}`, cls: "" };
  }

  function monthLabel(dateStr) {
    const d = new Date(dateStr);
    return `${d.getFullYear()}년 ${d.getMonth() + 1}월`;
  }

  function render() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const area = document.getElementById("areaFilter").value;
    const type = document.getElementById("typeFilter").value;

    const filtered = allFestivals.filter((f) => {
      const matchesQuery =
        !q ||
        f.title?.toLowerCase().includes(q) ||
        f.location?.toLowerCase().includes(q);
      const matchesArea = !area || String(f.area) === area;
      const matchesType = !type || f.type === type;
      return matchesQuery && matchesArea && matchesType;
    });

    const list = document.getElementById("list");
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">조건에 맞는 일정이 없어요.</div>';
      return;
    }

    const groups = new Map();
    const ongoing = [];
    for (const f of filtered) {
      if (daysUntil(f.startDate) < 0) {
        ongoing.push(f);
        continue;
      }
      const key = monthLabel(f.startDate);
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(f);
    }
    ongoing.sort((a, b) => (a.endDate || "").localeCompare(b.endDate || ""));

    let html = "";
    if (ongoing.length > 0) {
      html += renderGroup("지금 진행 중", ongoing);
    }
    for (const [month, items] of groups) {
      html += renderGroup(month, items);
    }
    list.innerHTML = html;
  }

  function renderGroup(title, items) {
    let html = `<div class="month-group"><div class="month-title">${title}</div>`;
    for (const f of items) {
      const dday = ddayLabel(f.startDate);
      const icon = f.type === "performance" ? "🎤" : "🎪";
      const img = f.thumbnail
        ? `<img src="${f.thumbnail}" alt="" loading="lazy" />`
        : `<div class="no-img">${icon}</div>`;
      const link = f.detailUrl || "#";
      const genreTag = f.genre ? `<span>· ${f.genre}</span>` : "";
      html += `
        <a class="card-link" href="${link}" target="_blank" rel="noopener">
          <div class="card">
            ${img}
            <div class="card-body">
              <p class="card-title">${f.title}</p>
              <div class="card-meta">
                <span>${f.startDate}${f.endDate && f.endDate !== f.startDate ? " ~ " + f.endDate : ""}</span>
                ${f.location ? `<span>· ${f.location}</span>` : ""}
                ${genreTag}
              </div>
            </div>
            <div class="dday ${dday.cls}">${dday.text}</div>
          </div>
        </a>`;
    }
    html += `</div>`;
    return html;
  }

  async function load() {
    try {
      const res = await fetch("festivals.json", { cache: "no-store" });
      const json = await res.json();
      allFestivals = json.festivals || [];

      const updated = new Date(json.updatedAt);
      document.getElementById("updatedAt").textContent =
        `마지막 업데이트: ${updated.toLocaleString("ko-KR")} · 총 ${json.count}건`;

      const areaSelect = document.getElementById("areaFilter");
      const usedAreas = new Set(allFestivals.map((f) => String(f.area)).filter(Boolean));
      for (const code of Object.keys(AREA_NAMES)) {
        if (usedAreas.has(code)) {
          const opt = document.createElement("option");
          opt.value = code;
          opt.textContent = AREA_NAMES[code];
          areaSelect.appendChild(opt);
        }
      }

      render();
    } catch (e) {
      document.getElementById("list").innerHTML =
        '<div class="empty">축제 데이터를 아직 불러올 수 없어요.<br/>festivals.json이 생성됐는지 확인해주세요.</div>';
      console.error(e);
    }
  }

  document.getElementById("search").addEventListener("input", render);
  document.getElementById("areaFilter").addEventListener("change", render);
  document.getElementById("typeFilter").addEventListener("change", render);

  load();
</script>
</body>
</html>
